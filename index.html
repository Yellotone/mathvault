<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vault · 123</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at 30% 20%, #1f2a3a, #0a1019);
      padding: 20px;
    }

    .vault-wrapper {
      background: #212e3f;
      background-image: linear-gradient(145deg, #2a3a4f 0%, #16212e 100%);
      padding: 30px 28px 40px;
      border-radius: 100px 100px 50px 50px;
      box-shadow: 0 30px 40px rgba(0,0,0,0.8), inset 0 0 0 2px #5d738b, inset 0 0 12px #a7bed9;
      max-width: 560px;
      width: 100%;
      transition: box-shadow 0.3s;
      border-bottom: 6px solid #0d151f;
    }

    .vault-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0 8px 10px 8px;
      color: #c8d9ec;
      text-shadow: 0 2px 3px #0a101a;
      letter-spacing: 2px;
      font-weight: 400;
      border-bottom: 2px dashed #3e536a;
    }

    .vault-header h2 {
      font-weight: 500;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vault-header span {
      font-size: 1rem;
      background: #0f1926;
      padding: 4px 16px;
      border-radius: 60px;
      color: #a0b9d4;
      border: 1px solid #3b526a;
    }

    .dial-panel {
      background: #141f2d;
      border-radius: 80px;
      padding: 26px 18px 22px;
      margin: 18px 0 20px;
      box-shadow: inset 0 10px 12px rgba(0,0,0,0.7), inset 0 -4px 6px #3a4f66, 0 6px 0 #0a111b;
      border: 1px solid #5b748d;
    }

    .digit-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .digit-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #1f2c3d;
      padding: 8px 6px 12px;
      border-radius: 40px;
      min-width: 80px;
      box-shadow: inset 0 2px 6px #0c131f, 0 6px 0 #0a111b;
    }

    .digit-box button {
      background: #30445c;
      border: none;
      border-radius: 30px;
      width: 54px;
      height: 38px;
      font-size: 1.8rem;
      font-weight: 600;
      color: #f0f6ff;
      cursor: pointer;
      box-shadow: 0 5px 0 #18222f, inset 0 2px 8px #94acc9;
      transition: 0.06s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      text-shadow: 0 2px 0 #0b121c;
    }

    .digit-box button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #18222f;
    }

    .digit-box .digit-value {
      background: #0a131f;
      color: #e2edfc;
      font-size: 3rem;
      font-weight: 700;
      width: 74px;
      height: 74px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50px;
      margin: 8px 0 6px;
      box-shadow: inset 0 6px 10px rgba(0,0,0,0.9), 0 0 0 3px #455e78;
      letter-spacing: 4px;
      font-feature-settings: "tnum";
    }

    .digit-box .digit-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #7b93ae;
      letter-spacing: 2px;
      font-weight: 500;
    }

    .action-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin: 8px 0 4px;
    }

    .open-btn {
      background: linear-gradient(145deg, #4f6f91, #2e425b);
      border: none;
      border-radius: 80px;
      padding: 16px 24px;
      font-size: 1.7rem;
      font-weight: 600;
      color: #f5fcff;
      text-shadow: 0 2px 0 #14212e;
      box-shadow: 0 10px 0 #1a283b, 0 6px 14px #0a101a;
      cursor: pointer;
      transition: 0.08s linear;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: 100%;
      border: 1px solid #7f99b5;
      letter-spacing: 2px;
    }

    .open-btn:active {
      transform: translateY(6px);
      box-shadow: 0 4px 0 #1a283b;
    }

    .open-btn:disabled {
      opacity: 0.5;
      transform: translateY(4px);
      box-shadow: 0 5px 0 #1a283b;
      pointer-events: none;
      filter: grayscale(0.3);
    }

    .reset-btn {
      background: #2d4057;
      border: none;
      border-radius: 60px;
      padding: 10px 28px;
      font-size: 1rem;
      font-weight: 500;
      color: #d2e1f0;
      box-shadow: 0 5px 0 #141f2d;
      cursor: pointer;
      transition: 0.06s linear;
      border: 1px solid #5a728d;
      width: fit-content;
    }

    .reset-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #141f2d;
    }

    .message-panel {
      background: #0f1a26;
      border-radius: 80px;
      padding: 16px 22px;
      margin: 18px 0 6px;
      border-left: 6px solid #7a97b8;
      border-right: 6px solid #263b4f;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      min-height: 5rem;
    }

    .status-led {
      width: 22px;
      height: 22px;
      border-radius: 30px;
      background: #465868;
      box-shadow: inset 0 2px 6px #0f161f, 0 0 6px #1f2b3a;
      transition: 0.25s;
      flex-shrink: 0;
    }

    .status-led.open {
      background: #54d67a;
      box-shadow: 0 0 20px #39c96a, inset 0 0 8px #eafff0;
    }

    .status-led.locked {
      background: #c94f4a;
      box-shadow: inset 0 2px 6px #461f1d;
    }

    .status-led.idle {
      background: #465868;
      box-shadow: inset 0 2px 6px #0f161f, 0 0 6px #1f2b3a;
    }

    .message-text {
      color: #d6e4f5;
      font-size: 1.25rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      flex: 1;
      text-align: center;
      min-height: 2.2rem;
    }

    .treasure-display {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 2rem;
      font-weight: 600;
      color: #fadc7a;
      text-shadow: 0 0 18px #f7b32b, 0 0 30px #a76f1a;
    }

    .treasure-icon {
      font-size: 2.8rem;
      filter: drop-shadow(0 0 8px #ffbb33);
    }

    .footer-hint {
      text-align: center;
      color: #6c839d;
      font-size: 0.8rem;
      margin-top: 18px;
      opacity: 0.7;
      letter-spacing: 2px;
      border-top: 1px solid #31475e;
      padding-top: 16px;
    }

    @media (max-width: 480px) {
      .vault-wrapper { padding: 20px 14px 30px; }
      .digit-box { min-width: 70px; padding: 4px 4px 10px; }
      .digit-box .digit-value { width: 64px; height: 64px; font-size: 2.5rem; }
      .digit-box button { width: 46px; height: 34px; font-size: 1.5rem; }
      .digit-row { gap: 10px; }
    }
  </style>
</head>
<body>
<div class="vault-wrapper" role="main" aria-label="Secure vault with 3-digit combination lock">
  <div class="vault-header">
    <h2>🔐 VAULT</h2>
    <span>3‑digit</span>
  </div>

  <div class="dial-panel">
    <div class="digit-row" id="digitRow"></div>
    <div class="action-bar">
      <button class="open-btn" id="openVaultBtn"><span>🔓</span> OPEN</button>
      <button class="reset-btn" id="resetBtn">⟳ reset</button>
    </div>
  </div>

  <div class="message-panel" id="messagePanel">
    <span class="status-led idle" id="statusLed"></span>
    <span class="message-text" id="messageText">enter combination</span>
  </div>
  <div class="footer-hint">⚙️ default combination: 1 · 2 · 3</div>
</div>

<script>
  (function() {
    // ----- TARGET COMBO -----
    const COMBO = [1, 2, 3];
    let currentDigits = [0, 0, 0];
    let vaultOpened = false;
    let hasSubmitted = false;      // track if user has pressed OPEN since last reset

    // DOM elements
    const digitRow = document.getElementById('digitRow');
    const messageText = document.getElementById('messageText');
    const statusLed = document.getElementById('statusLed');
    const openBtn = document.getElementById('openVaultBtn');
    const resetBtn = document.getElementById('resetBtn');

    // ----- helpers -----
    function setMessage(text, isTreasure = false) {
      if (isTreasure) {
        messageText.innerHTML = `<span class="treasure-display"><span class="treasure-icon">💎</span> TREASURE ! ${text}</span>`;
      } else {
        messageText.textContent = text;
      }
    }

    function setLedState(state) {
      // state: 'open', 'locked', 'idle'
      statusLed.className = 'status-led ' + state;
    }

    // refresh UI based on state (vaultOpened, hasSubmitted)
    function refreshUI() {
      // update digit values
      for (let i = 0; i < 3; i++) {
        const valueSpan = document.querySelector(`.digit-box[data-index="${i}"] .digit-value`);
        if (valueSpan) valueSpan.textContent = currentDigits[i];
      }

      if (vaultOpened) {
        setMessage('✨ vault unlocked · treasures inside ✨', true);
        setLedState('open');
        openBtn.disabled = true;
        return;
      }

      // vault is locked
      if (!hasSubmitted) {
        // No submission yet: show idle / neutral message
        setMessage('🔢 enter combination');
        setLedState('idle');
        openBtn.disabled = false;
      } else {
        // User has submitted: show result (correct or wrong)
        const isCorrect = currentDigits.every((val, idx) => val === COMBO[idx]);
        if (isCorrect) {
          // This case should not happen because correct submission opens vault,
          // but keep for safety.
          vaultOpened = true;
          refreshUI();
          return;
        } else {
          setMessage('❌ wrong combination · try again');
          setLedState('locked');
          openBtn.disabled = false;
        }
      }
    }

    // ----- attempt to open (submit) -----
    function attemptOpen() {
      if (vaultOpened) {
        refreshUI();
        return;
      }

      // Mark that user has submitted
      hasSubmitted = true;

      const isCorrect = currentDigits.every((val, idx) => val === COMBO[idx]);
      if (isCorrect) {
        // SUCCESS: open vault
        vaultOpened = true;
        setMessage('🏆 GOLD & JEWELS UNLOCKED! 🏆', true);
        setLedState('open');
        openBtn.disabled = true;
        // celebration glow
        document.querySelector('.vault-wrapper').style.boxShadow = '0 0 40px #f7b32b55, 0 30px 40px #000000cc';
      } else {
        // WRONG: show error, keep locked
        setMessage('❌ wrong combination · try again');
        setLedState('locked');
        // nudge effect
        const wrapper = document.querySelector('.vault-wrapper');
        wrapper.style.transform = 'translateX(-8px)';
        setTimeout(() => wrapper.style.transform = '', 120);
        // open button remains enabled, user can try again
        openBtn.disabled = false;
      }
    }

    // ----- reset vault (close, reset digits, clear submission flag) -----
    function resetVault() {
      vaultOpened = false;
      hasSubmitted = false;
      currentDigits = [0, 0, 0];
      // reset glow
      document.querySelector('.vault-wrapper').style.boxShadow = '';
      refreshUI();
      setMessage('↺ reset · enter combination');
      setLedState('idle');
      openBtn.disabled = false;
    }

    // ----- change digit (delta: +1 or -1) -----
    function changeDigit(index, delta) {
      if (vaultOpened) {
        // If vault is open, spinning digits does nothing to state, but we allow it.
        // Keep treasure message, just update the number display.
        let newVal = currentDigits[index] + delta;
        if (newVal > 9) newVal = 0;
        if (newVal < 0) newVal = 9;
        currentDigits[index] = newVal;
        const valueSpan = document.querySelector(`.digit-box[data-index="${index}"] .digit-value`);
        if (valueSpan) valueSpan.textContent = currentDigits[index];
        return;
      }

      // Normal locked state: change digit
      let newVal = currentDigits[index] + delta;
      if (newVal > 9) newVal = 0;
      if (newVal < 0) newVal = 9;
      currentDigits[index] = newVal;

      // Update display
      const valueSpan = document.querySelector(`.digit-box[data-index="${index}"] .digit-value`);
      if (valueSpan) valueSpan.textContent = currentDigits[index];

      // If user has already submitted and failed, we clear the error message
      // and go back to idle state (but keep hasSubmitted true? we want them to
      // try again, but we should show neutral state until they submit again)
      if (hasSubmitted && !vaultOpened) {
        // After a wrong attempt, if user changes digits, we reset the submission state
        // so they can try again without seeing the error.
        hasSubmitted = false;
        setMessage('🔢 enter combination');
        setLedState('idle');
        openBtn.disabled = false;
      } else if (!hasSubmitted && !vaultOpened) {
        // Still idle, keep neutral message
        setMessage('🔢 enter combination');
        setLedState('idle');
      }

      // If combo is correct and user hasn't submitted, we don't reveal it.
      // We keep showing neutral message.
      // The open button stays enabled.
      openBtn.disabled = false;
    }

    // ----- build digit spinners -----
    function buildSpinners() {
      digitRow.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const box = document.createElement('div');
        box.className = 'digit-box';
        box.dataset.index = i;

        const upBtn = document.createElement('button');
        upBtn.setAttribute('aria-label', `Digit ${i+1} up`);
        upBtn.textContent = '▲';
        upBtn.addEventListener('click', (e) => {
          e.preventDefault();
          changeDigit(i, 1);
        });

        const valueDiv = document.createElement('div');
        valueDiv.className = 'digit-value';
        valueDiv.textContent = '0';

        const downBtn = document.createElement('button');
        downBtn.setAttribute('aria-label', `Digit ${i+1} down`);
        downBtn.textContent = '▼';
        downBtn.addEventListener('click', (e) => {
          e.preventDefault();
          changeDigit(i, -1);
        });

        const label = document.createElement('div');
        label.className = 'digit-label';
        label.textContent = `#${i+1}`;

        box.appendChild(upBtn);
        box.appendChild(valueDiv);
        box.appendChild(downBtn);
        box.appendChild(label);
        digitRow.appendChild(box);
      }
    }

    // ----- init -----
    function init() {
      buildSpinners();
      currentDigits = [0, 0, 0];
      vaultOpened = false;
      hasSubmitted = false;
      refreshUI();
      setMessage('🔢 enter combination');
      setLedState('idle');
      openBtn.disabled = false;

      openBtn.addEventListener('click', attemptOpen);
      resetBtn.addEventListener('click', resetVault);
    }

    init();
  })();
</script>
</body>
</html>
